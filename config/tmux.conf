# ============================================
# DEVBOX TMUX CONFIG - Remote-friendly defaults
# ============================================

# ---------- Terminal behavior ----------
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB"
set -g focus-events on
set -g escape-time 10
set -g repeat-time 500
set -g set-clipboard on

# ---------- Session behavior ----------
set -g history-limit 100000
set -g renumber-windows on
set -g detach-on-destroy off
set -g display-time 2000
set -g display-panes-time 1500
set -g status-interval 5

# ---------- Navigation and copy mode ----------
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
set -g status-keys vi

# Keep window names useful without letting shell prompts rename them.
setw -g automatic-rename on
set -g allow-rename off
set -g set-titles on

# ---------- Keybindings ----------
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n M-Left select-pane -L
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right select-pane -R
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind = select-layout even-horizontal
bind + select-layout even-vertical
bind Space next-layout
bind z resize-pane -Z

# ---------- Copy mode ----------
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel
if-shell 'command -v pbcopy >/dev/null 2>&1' 'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"'
if-shell 'command -v wl-copy >/dev/null 2>&1' 'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"'
if-shell 'command -v xclip >/dev/null 2>&1' 'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"'

# ---------- Activity and panes ----------
setw -g monitor-activity on
set -g visual-activity off
set -g bell-action none
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour70"
set -g pane-border-format " #{pane_index}: #{pane_title} "

# ---------- Status line ----------
set -g status on
set -g status-position bottom
set -g status-style "bg=colour236,fg=colour248"
set -g status-left-length 50
set -g status-right-length 120
set -g status-left "#[fg=colour70,bold] #S #[fg=colour244,nobold]| #[fg=colour250]#h "
set -g status-right "#[fg=colour244]#{pane_current_command} #[fg=colour244]| #[fg=colour250]%Y-%m-%d %H:%M "
setw -g window-status-separator ""
setw -g window-status-format "#[fg=colour244] #I:#W#{?window_flags,#{window_flags},} "
setw -g window-status-current-format "#[bg=colour70,fg=colour16,bold] #I:#W#{?window_flags,#{window_flags},} "
